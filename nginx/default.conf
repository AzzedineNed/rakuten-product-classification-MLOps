# Nginx reverse proxy in front of the image API ("sécurisation").
#
# What it adds on top of raw uvicorn:
#   * single public entrypoint on :80 — the API container is NOT published
#     to the host anymore, only reachable through this proxy
#   * per-IP rate limiting (cheap DoS protection)
#   * request body cap (uploads are single product images)
#   * HTTP basic auth on the /train endpoints (retraining is not for anonymous
#     callers; /predict and /health stay open)
#   * hides the server version banner
#
# Auth file: create it once on the host (NOT committed — gitignored):
#   printf "admin:$(openssl passwd -apr1)\n" > nginx/.htpasswd
# (prompts for the password; add more users by appending lines)
#
# When the service split happens (image / text / fusion), this file grows one
# upstream + location block per service — nothing else changes.

# Per-client-IP rate-limit zones.
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=train:10m   rate=1r/s;

upstream rakuten_image_api {
    server api:8000;   # docker-compose service name
}

server {
    listen 80;
    server_name _;

    server_tokens off;          # don't advertise the nginx version
    client_max_body_size 10m;   # product images are small; cap uploads
    limit_req_status 429;       # Too Many Requests (nginx default is a misleading 503)

    # Standard proxy headers so FastAPI sees the real client.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Everything not matched below (/health, /docs, /openapi.json, ...).
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://rakuten_image_api;
    }

    location /predict {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://rakuten_image_api;
        # First prediction in a fresh process loads the backbone and may pull
        # the model from the MLflow registry — allow more than the 60s default.
        proxy_read_timeout 180s;
    }

    # Retraining endpoints are gated behind basic auth.
    location /train {
        auth_basic "Rakuten image API - training";
        auth_basic_user_file /etc/nginx/.htpasswd;
        limit_req zone=train burst=5 nodelay;
        proxy_pass http://rakuten_image_api;
    }
}
