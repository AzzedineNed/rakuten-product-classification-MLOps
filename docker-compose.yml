services:
  api:
    build: .
    image: rakuten-image-mlops:latest
    container_name: rakuten-image-api
    # No host port: the API is only reachable through the nginx proxy below.
    # (For direct access during debugging, uncomment:)
    # ports:
    #   - "8000:8000"
    expose:
      - "8000"
    volumes:
      # Persist data, trained models and reports on the host.
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      # Cache downloaded backbone weights across runs.
      - torch-cache:/root/.cache/torch
    environment:
      - RAKUTEN_CLASSIFIER=mlp
    # Inject secrets (MLflow/DagsHub creds) at RUNTIME — .env is excluded from
    # the image by .dockerignore, so this is the only way the container gets
    # them, and they never end up baked into image layers.
    env_file:
      - .env
    restart: unless-stopped

    # --- Optional GPU (nvidia-container-toolkit, no Docker Desktop) ---
    # Uncomment to expose your GPU. Not needed for this pipeline.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  nginx:
    image: nginx:1.27-alpine
    container_name: rakuten-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Create once with: printf "admin:$(openssl passwd -apr1)\n" > nginx/.htpasswd
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  torch-cache: